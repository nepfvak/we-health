backend:
  name: github
  repo: nepfvak/we-health
  branch: main
  base_url: https://wehealthinstitute.com
  auth_endpoint: api/auth

media_folder: assets
public_folder: /assets

collections:
  - name: blog
    label: Blog Posts
    folder: content/blog
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{fields.slug}}"
    fields:
      - { label: Title,           name: title,     widget: string }
      - { label: Slug,            name: slug,      widget: string,
          hint: "URL-friendly identifier, e.g. what-is-acupuncture" }
      - { label: Date,            name: date,      widget: datetime }
      - { label: Author,          name: author,    widget: string,
          default: "Dr. Yingjuan Liang (Selina)" }
      - { label: Thumbnail Image, name: thumbnail, widget: image,
          required: false }
      - { label: Excerpt,         name: excerpt,   widget: text }
      - { label: Body,            name: body,      widget: markdown }
